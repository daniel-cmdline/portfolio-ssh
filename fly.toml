app = 'dani-portfolio'
primary_region = 'gru'

[env]
  PORT = "2222" # Força a variável de ambiente a ir como 2222

[[services]]
  internal_port = 2222 # O Fly vai redirecionar a 443 para a 2222 do seu Go
  protocol = "tcp"

  [[services.ports]]
    handlers = []
    port = 443 # O mundo continua conectando por aqui de fora

  [[services.tcp_checks]]
    grace_period = "2s"
    interval = "15s"
    restart_limit = 5
    timeout = "2s"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1